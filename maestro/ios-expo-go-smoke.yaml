appId: host.exp.Exponent
---
- runFlow:
    when:
      visible: Continue
    commands:
      - tapOn:
          text: Continue
- runFlow:
    when:
      visible: Close
    commands:
      - tapOn:
          text: Close
- runFlow:
    when:
      visible: Open
    commands:
      - tapOn:
          text: Open
- runFlow:
    when:
      visible: Continue
    commands:
      - tapOn:
          text: Continue
- runFlow:
    when:
      visible: Close
    commands:
      - tapOn:
          text: Close
- runFlow:
    when:
      visible: meetpin
    commands:
      - tapOn:
          text: meetpin
      - extendedWaitUntil:
          visible: Continue
          timeout: 30000
      - tapOn:
          text: Continue
      - tapOn:
          text: Close
- runFlow:
    when:
      visible: Continue
    commands:
      - tapOn:
          text: Continue
- runFlow:
    when:
      visible: Close
    commands:
      - tapOn:
          text: Close
- extendedWaitUntil:
    visible:
      id: home-title
    timeout: 120000
- assertVisible:
    id: home-title
- tapOn:
    text: Explore
- assertVisible:
    id: explore-title
- tapOn:
    text: Home
- assertVisible:
    id: home-title
