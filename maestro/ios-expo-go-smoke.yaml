appId: host.exp.Exponent
---
- runFlow:
    when:
      visible: Open
    commands:
      - tapOn: Open
- extendedWaitUntil:
    visible:
      id: home-title
    timeout: 120000
- assertVisible:
    id: home-title
- tapOn:
    text: Explore
- assertVisible:
    id: explore-title
- tapOn:
    text: Home
- assertVisible:
    id: home-title
