name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verification checks
        run: pnpm verify

  playwright:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm playwright:install

      - name: Run Playwright E2E tests
        run: pnpm e2e:playwright

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  maestro-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Boot iOS simulator
        run: |
          DEVICE_ID=$(python3 - <<'PY'
          import json
          import subprocess
          import sys

          data = json.loads(
              subprocess.check_output(
                  ['xcrun', 'simctl', 'list', 'devices', 'available', '-j'],
                  text=True,
              )
          )

          candidates = []
          for runtime, devices in data.get('devices', {}).items():
              for device in devices:
                  if not device.get('isAvailable', True):
                      continue
                  if not device.get('name', '').startswith('iPhone'):
                      continue

                  state_rank = 0 if device.get('state') == 'Booted' else 1
                  runtime_rank = 0 if 'iOS' in runtime else 1
                  candidates.append(
                      (
                          state_rank,
                          runtime_rank,
                          runtime,
                          device['name'],
                          device['udid'],
                      )
                  )

          if not candidates:
              sys.exit('No available iPhone simulators found')

          candidates.sort()
          _, _, runtime, name, udid = candidates[0]
          print(f'Selected simulator: {name} ({runtime})', file=sys.stderr)
          print(udid)
          PY
          )

          echo "Using simulator $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          open -a Simulator
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Run Maestro iOS smoke test
        run: bash ./scripts/run-maestro-ios-ci.sh

      - name: Upload Maestro debug output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: .maestro-debug
          if-no-files-found: ignore

      - name: Upload Expo iOS log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: expo-ios-log
          path: expo-ios.log
          if-no-files-found: ignore
